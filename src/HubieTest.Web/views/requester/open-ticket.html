<!-- open-ticket.html (REQUESTER) -->
<div class="page">
    <h2>Open ticket</h2>

    <div class="card">
        <form ng-submit="save()" novalidate>

            <label>Title <span style="color:#c53030">*</span></label>
            <input type="text" ng-model="ticket.TICKET_TITLE" maxlength="200"
                   placeholder="Brief summary of the issue" />

            <label>Category <span style="color:#c53030">*</span></label>
            <select ng-model="ticket.CATEGORY_ID"
                    ng-options="c.CATEGORY_ID as c.CATEGORY_NAME for c in categories">
                <option value="">Select a category...</option>
            </select>

            <label>Description</label>
            <textarea ng-model="ticket.TICKET_DESCRIPTION" rows="5"
                      placeholder="Describe the issue in detail (optional)"></textarea>

            <label>Attachment <em>(optional — max 10 MB)</em></label>
            <input type="file" id="attachment"
                   onchange="angular.element(this).scope().onFileChange(this)" />
            <em ng-if="file">Selected: {{ file.name }}</em>


            <div class="actions" style="margin-top:16px">
                <button type="submit" class="btn btn-primary"
                        ng-disabled="saving">
                    {{ saving ? 'Opening...' : 'Open ticket' }}
                </button>
                <a class="btn" ui-sref="app.myTickets">Cancel</a>
            </div>
        </form>
    </div>

    <p class="muted">Categories available: {{ categories.length }}</p>
</div>
